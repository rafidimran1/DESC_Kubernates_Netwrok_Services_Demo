apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-portal
  namespace: networking-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: employee-portal
  template:
    metadata:
      labels:
        app: employee-portal
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
